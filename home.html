<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Issues Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- Navbar -->
     <nav class="bg-white shadow flex justify-between items-center px-6 py-4">
        <div class="flex items-center gap-2">

             <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-6">
            <h1 class="font-semibold">GitHub Issues Tracker</h1>
         </div>

        <div class="flex gap-3">

             <input id="search"
             type="text"
             placeholder="Search issues..."
             class="border px-3 py-1 rounded">

             <button class="bg-purple-600 text-white px-4 py-2 rounded">
             + New Issue
             </button>

         </div>

     </nav>

     <!-- Tabs -->

     <div class="max-w-6xl mx-auto mt-8">

        
         <div class="bg-white p-4 rounded-lg shadow">

             <div class="flex gap-3 mb-6">

             <button onclick="filterIssues('all')" class="tabBtn activeTab">All</button>

             <button onclick="filterIssues('open')" class="tabBtn">
             Open
             </button>

             <button onclick="filterIssues('closed')" class="tabBtn">
             Closed
             </button>

             </div>

             <div class="flex justify-between items-center mb-6">

                 <div>
                     <h3 class="font-semibold text-lg">
                     <span id="issueCount">0</span> Issues
                     </h3>

                     <p class="text-gray-500 text-sm">
                     Track and manage your project issues
                     </p>

                 </div>

                 <div class="flex gap-4 text-sm">

                     <div class="flex items-center gap-1">
                         <div class="w-2 h-2 bg-green-500 rounded"></div>
                         Open
                         </div>

                         <div class="flex items-center gap-1">
                             <div class="w-2 h-2 bg-purple-600 rounded"></div>
                     Closed
                     </div>

                 </div>

             </div>


</body>
</html>
