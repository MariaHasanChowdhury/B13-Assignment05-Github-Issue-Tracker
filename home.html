<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Issues Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- Navbar -->
     <nav class="bg-white shadow flex justify-between items-center px-6 py-4">
        <div class="flex items-center gap-2">

             <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-6">
            <h1 class="font-semibold">GitHub Issues Tracker</h1>
         </div>

        <div class="flex gap-3">

             <input id="search"
             type="text"
             placeholder="Search issues..."
             class="border px-3 py-1 rounded">

             <button class="bg-purple-600 text-white px-4 py-2 rounded">
             + New Issue
             </button>

         </div>

     </nav>

     <!-- Tabs -->

     <div class="max-w-6xl mx-auto mt-8">

        
         <div class="bg-white p-4 rounded-lg shadow">

             <div class="flex gap-3 mb-6">

             <button onclick="filterIssues('all')" class="tabBtn activeTab">All</button>

             <button onclick="filterIssues('open')" class="tabBtn">
             Open
             </button>

             <button onclick="filterIssues('closed')" class="tabBtn">
             Closed
             </button>

             </div>

             <div class="flex justify-between items-center mb-6">

                 <div>
                     <h3 class="font-semibold text-lg">
                     <span id="issueCount">0</span> Issues
                     </h3>

                     <p class="text-gray-500 text-sm">
                     Track and manage your project issues
                     </p>

                 </div>

                 <div class="flex gap-4 text-sm">

                     <div class="flex items-center gap-1">
                         <div class="w-2 h-2 bg-green-500 rounded"></div>
                         Open
                         </div>

                         <div class="flex items-center gap-1">
                             <div class="w-2 h-2 bg-purple-600 rounded"></div>
                     Closed
                     </div>

                 </div>

             </div>

             <!-- Issues Grid -->

             <div id="issuesContainer"
             class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
             </div>

         </div>

     </div>
     <!-- Modal -->

     <div id="modal"
     class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">

         <div class="bg-white w-[420px] rounded-lg p-6">

             <h2 id="modalTitle" class="text-lg font-semibold mb-2"></h2>

             <div class="flex gap-2 text-xs mb-3">

             <span class="bg-green-100 text-green-600 px-2 py-1 rounded">
             Open
             </span>

             <span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded">
             Bug
             </span>

             <span class="bg-orange-100 text-orange-600 px-2 py-1 rounded">
             Help Wanted
             </span>

         </div>

         <p id="modalDesc" class="text-gray-600 text-sm mb-4"></p>

         <div class="flex justify-between text-sm">

         <div>
             <p class="text-gray-500">Assignee:</p>
             <p id="modalAuthor"></p>
         </div>

         <div>
             <p class="text-gray-500">Priority:</p>
             <p id="modalPriority"
             class="bg-red-500 text-white px-2 py-1 rounded text-xs inline-block">
             </p>
         </div>

     </div>

     <button onclick="closeModal()"
     class="bg-purple-600 text-white px-4 py-2 rounded mt-6 float-right">
     Close
     </button>

 </div>

 </div>

<script src="script.js"></script>

</body>
</html>
